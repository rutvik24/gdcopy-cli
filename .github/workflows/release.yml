name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Determine Version
        id: get_version
        run: |
          VERSION="${{ github.ref_name }}"
          # Fallback if manual dispatch and not on a tag
          if [[ -z "$VERSION" || "$VERSION" == "main" || "$VERSION" == "master" ]]; then
            VERSION="v1.0.0"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building version: $VERSION"

      - name: Build & Package Binaries
        run: |
          mkdir -p dist
          # Supported platform and CPU architecture combinations
          PLATFORMS=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )
          
          for PLATFORM in "${PLATFORMS[@]}"; do
            IFS="/" read -r -a arr <<< "${PLATFORM}"
            GOOS="${arr[0]}"
            GOARCH="${arr[1]}"
            
            BINARY_NAME="gdcopy"
            if [ "$GOOS" = "windows" ]; then
              BINARY_NAME="${BINARY_NAME}.exe"
            fi
            
            echo "Compiling for GOOS=${GOOS} GOARCH=${GOARCH}..."
            env GOOS=${GOOS} GOARCH=${GOARCH} go build \
              -ldflags="-s -w -X main.Version=${{ env.VERSION }}" \
              -o "dist/${BINARY_NAME}" .
              
            ARCHIVE_NAME="gdcopy-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then
              zip -j "dist/${ARCHIVE_NAME}.zip" "dist/${BINARY_NAME}"
              rm "dist/${BINARY_NAME}"
            else
              tar -czf "dist/${ARCHIVE_NAME}.tar.gz" -C dist "${BINARY_NAME}"
              rm "dist/${BINARY_NAME}"
            fi
          done

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
